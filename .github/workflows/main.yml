name: CI
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
jobs:
  awesome_lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - run: npx awesome-lint
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.7
      - run: gem install awesome_bot
      # White list:
      # - awesome.re: redirects to github.com/sindresorhus/awesome, expected behaviour for the badge
      # - davison.io: SSL certificate hostname mismatch, site is up but cert doesn't match
      # - reddit.com: bot is blocked by Reddit (403), subreddit is active
      # - github.com/graphific/DeepDreamVideo/blob/master/frames2gif.sh: rate limited (429), repo is valid
      - run: awesome_bot readme.md --white-list awesome.re,davison.io,reddit.com,github.com/graphific/DeepDreamVideo/blob/master/frames2gif.sh